<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te Tahi</title>
  <script>
    (function () {
      var repoBase = '/570_Te_Tahi/';
      var path = window.location.pathname;

      if (path.indexOf(repoBase) !== 0) {
        window.location.replace(repoBase);
        return;
      }

      var route = path.slice(repoBase.length);
      window.location.replace(repoBase + '#/' + route + window.location.search + window.location.hash);
    })();
  </script>
</head>

<body></body>

</html>
